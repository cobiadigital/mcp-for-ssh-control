# Cloudflare Worker config for the Lightsail MCP server.
#
# Deployment model: dashboard-only (Workers Builds), no local wrangler needed.
# Connect the repo in the dashboard with Root Directory = `worker`; every
# push then builds and deploys this folder.
#
# IMPORTANT — how config vs. dashboard settings interact on each deploy:
#   - BINDINGS (Durable Objects, KV) must be declared in THIS file. Bindings
#     added only through the dashboard UI are removed on the next
#     push-triggered deploy, because this config file is authoritative for
#     bindings. That's why the KV namespace id has to be pasted below (a
#     one-time edit — the GitHub web editor is fine).
#   - VARIABLES and SECRETS are the opposite: `keep_vars = true` below tells
#     wrangler NOT to touch dashboard-managed variables, so you set all of
#     them in the dashboard (Worker → Settings → Variables and Secrets) and
#     they survive every deploy. Nothing sensitive ever lives in this file.

name = "lightsail-mcp"
main = "src/index.ts"
compatibility_date = "2025-11-01"
# nodejs_compat is required by @modelcontextprotocol/sdk (it pulls in
# node builtins like crypto/buffer at the edges).
compatibility_flags = ["nodejs_compat"]

# Preserve environment variables managed in the dashboard instead of
# deleting anything not listed in this file (see note above).
keep_vars = true

# ---------------------------------------------------------------------------
# Durable Object binding for the MCP agent.
#
# The `agents` package's McpAgent runs each MCP session inside a Durable
# Object. `McpAgent.serve()/serveSSE()` look up the namespace under the
# binding name "MCP_OBJECT" by default, and `class_name` must match the
# exported class in src/index.ts exactly (`LightsailMCP`).
# ---------------------------------------------------------------------------
[durable_objects]
bindings = [{ name = "MCP_OBJECT", class_name = "LightsailMCP" }]

# McpAgent requires SQLite-backed Durable Objects (it persists transport
# state in DO storage), hence `new_sqlite_classes` rather than `new_classes`.
[[migrations]]
tag = "v1"
new_sqlite_classes = ["LightsailMCP"]

# ---------------------------------------------------------------------------
# KV namespace used by @cloudflare/workers-oauth-provider to store OAuth
# clients, grants, and tokens.
#
# Create it in the dashboard: Storage & Databases → KV → Create namespace
# (any name, e.g. "lightsail-mcp-oauth"), then copy its Namespace ID and
# paste it below. The id is not a secret — it's just an identifier, safe
# to commit.
# ---------------------------------------------------------------------------
[[kv_namespaces]]
binding = "OAUTH_KV"
id = "<REPLACE_WITH_KV_NAMESPACE_ID>"

# ---------------------------------------------------------------------------
# Runtime configuration — set ALL of these in the dashboard under
# Worker → Settings → Variables and Secrets (kept across deploys thanks to
# keep_vars above):
#
# Plain text variables:
#   ALLOWED_GITHUB_USER    — the ONLY GitHub username allowed to log in
#   INTERNAL_SERVICE_URL   — https://lightsail-internal.<yourdomain>.com
#
# Secrets:
#   GITHUB_CLIENT_ID       — GitHub OAuth app client id
#   GITHUB_CLIENT_SECRET   — GitHub OAuth app client secret
#   COOKIE_ENCRYPTION_KEY  — random string for signing the approval cookie
#                            (e.g. `openssl rand -hex 32`)
#   ACCESS_CLIENT_ID       — Cloudflare Access service token client id
#   ACCESS_CLIENT_SECRET   — Cloudflare Access service token client secret
# ---------------------------------------------------------------------------
